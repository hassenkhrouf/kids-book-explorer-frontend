<div class="app-wrapper">

  <!-- Floating sky decorations -->
  <div class="sky-decorations" aria-hidden="true">
    <span class="deco deco--cloud-1">☁️</span>
    <span class="deco deco--cloud-2">☁️</span>
    <span class="deco deco--star-1">⭐</span>
    <span class="deco deco--star-2">✨</span>
    <span class="deco deco--star-3">🌟</span>
    <span class="deco deco--rainbow">🌈</span>
  </div>

  <nav class="navbar">
    <div class="nav-brand" routerLink="/">
      <span class="logo-icon">📖</span>
      <span class="logo-text">Kids Book Explorer</span>
    </div>

    <div class="nav-links">
      <a routerLink="/" routerLinkActive="active-link" [routerLinkActiveOptions]="{ exact: true }">🏠 Home</a>
      <a routerLink="/categories" routerLinkActive="active-link">📚 Categories</a>
    </div>
  </nav>

  <main class="main-content">
    <router-outlet></router-outlet>
  </main>

</div>
