<div class="form-container">
    <h2>✍️ Add a New Book</h2>

    <form [formGroup]="bookForm" (ngSubmit)="onSubmit()">

        <div class="form-group">
            <label>Title <span class="required">*</span></label>
            <input type="text" formControlName="title" placeholder="e.g. The Magic Zoo">

            <!-- Shows an error message if the user clicks submit without a title -->
            <small class="error-msg" *ngIf="bookForm.get('title')?.invalid && bookForm.get('title')?.touched">
                Book title is required!
            </small>
        </div>

        <div class="form-group">
            <label>Category <span class="required">*</span></label>
            <select formControlName="category">
                <option value="Adventure">🦸 Adventure</option>
                <option value="Fairy Tales">🧚 Fairy Tales</option>
                <option value="Education">🎓 Education</option>
            </select>
        </div>

        <div class="form-group">
            <label>Image URL</label>
            <input type="text" formControlName="imageUrl" placeholder="https://picsum.photos/seed/newbook/400/500">
        </div>

        <div class="form-group">
            <label>Short Description</label>
            <textarea formControlName="description" rows="3" placeholder="What is the story about?"></textarea>
        </div>

        <div class="form-group">
            <label>Story Content</label>
            <textarea formControlName="content" rows="6" placeholder="Once upon a time..."></textarea>
        </div>

        <button type="submit" class="submit-btn" [disabled]="isSubmitting">
            {{ isSubmitting ? 'Saving...' : '🎉 Add Book' }}
        </button>

    </form>
</div>
